<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07101a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Fleet Protect 365 Driver</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <button id="backBtn" class="icon-btn hidden" aria-label="Go back">←</button>
      <div>
        <div class="brand">Fleet Protect 365</div>
        <div id="screenTitle" class="screen-title">Driver</div>
      </div>
      <button id="homeBtn" class="icon-btn hidden" aria-label="Home">⌂</button>
    </header>

    <main id="main"></main>

    <footer class="footer">
      <button id="feedbackFooter" class="text-btn">Feedback / Suggestion</button>
      <span>Driver v1.5</span>
    </footer>
  </div>

  <dialog id="modal" class="modal">
    <form method="dialog" class="modal-card">
      <h2 id="modalTitle">Notice</h2>
      <div id="modalBody"></div>
      <button class="primary" value="close">Close</button>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
